<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seed College Profile (dev)</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f3ff;
        color: #1e1b4b;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 2rem 2.5rem;
        box-shadow: 0 10px 30px rgba(76, 29, 149, 0.08);
        max-width: 28rem;
        text-align: center;
      }
      a {
        color: #6d28d9;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Seeding test profile…</h1>
      <p id="status">Writing the sample College Profile to this browser.</p>
      <p><a href="/college-planning/college-profile">Go to College Profile →</a></p>
    </div>

  </body>
</html>
